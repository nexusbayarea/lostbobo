name: Deploy Worker (RunPod / Backend Worker)

on:
  push:
    branches:
      - main
    paths:
      - 'services/worker/**'
      - '.github/workflows/deploy-worker.yml'
      - 'Dockerfile.worker'
  workflow_dispatch:

jobs:
  deploy-worker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1
        with:
          # The base URL of your Infisical instance
          infisical_url: https://app.infisical.com
          # Encoded secret (client_id:client_secret) - use GitHub secret for machine identity
          # Set INFISICAL_CLIENT_ID and INFISICAL_CLIENT_SECRET as GitHub secrets
          client_id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client_secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          # Project and environment
          project_id: simhpc
          env: prod
          # Secrets to fetch (as env vars)
          secrets: |
            DOCKER_ACCESS_TOKEN
            DOCKER_USERNAME

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            simhpcworker/simhpc-worker:latest
            simhpcworker/simhpc-worker:v2.5.3
