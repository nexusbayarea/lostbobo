[supervisord]
nodaemon=true

[program:api]
command=python3 -m uvicorn app.api.router:app --host 0.0.0.0 --port 8080
directory=/app
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr

[program:worker]
command=python3 -m worker.worker
directory=/app
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr

[program:autoscaler]
command=python3 -m autoscaler.scaler_engine
directory=/app
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr