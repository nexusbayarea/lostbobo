name: Deploy to Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - 'services/worker/**'
      - '.github/workflows/deploy-worker.yml'
      - 'Dockerfile.worker'
      - 'Dockerfile.autoscaler'
  workflow_dispatch:

jobs:
  deploy-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build and push worker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            simhpcworker/simhpc-worker:latest
            simhpcworker/simhpc-worker:v2.5.3

      - name: Build and push autoscaler image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.autoscaler
          push: true
          tags: |
            simhpcworker/simhpc-autoscaler:latest
            simhpcworker/simhpc-autoscaler:v2.5.3
