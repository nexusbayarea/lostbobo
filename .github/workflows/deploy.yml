name: Deploy SimHPC

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PW_TOKEN }}

      - name: Build & Push Unified Image
        run: |
          docker build \
            -f Dockerfile.unified \
            -t simhpcworker/simhpc-unified:latest \
            .
          docker push simhpcworker/simhpc-unified:latest

      - name: Build & Push Worker Image
        run: |
          docker build \
            -f Dockerfile.worker \
            -t simhpcworker/simhpc-worker:latest \
            .
          docker push simhpcworker/simhpc-worker:latest

      - name: Build & Push Autoscaler Image
        run: |
          docker build \
            -f Dockerfile.autoscaler \
            -t simhpcworker/simhpc-autoscaler:latest \
            .
          docker push simhpcworker/simhpc-autoscaler:latest

      - name: Deploy to RunPod (API)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ID: ${{ secrets.RUNPOD_ID }}
        run: |
          echo "Restarting pod: $RUNPOD_ID"
          
          response=$(curl -s -X POST "https://api.runpod.io/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -d "{\"query\": \"mutation { podRestart(podId: \\"$RUNPOD_ID\\") { id status } }\"}")
          
          echo "Response: $response"
          
          if echo "$response" | grep -q "\"errors\""; then
            echo "Error restarting pod"
            exit 1
          fi
          
          echo "Pod restarted"

      - name: Wait for pod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ID: ${{ secrets.RUNPOD_ID }}
        run: |
          attempt=0
          while [ $attempt -lt 30 ]; do
            attempt=$((attempt + 1))
            status_response=$(curl -s -X POST "https://api.runpod.io/graphql" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -d "{\"query\": \"query { pod(input: { podId: \\"$RUNPOD_ID\\"}) { id status } }\"}")
            current_status=$(echo "$status_response" | grep -o "\"status\":\"[^\"]*\"" | head -1 | cut -d'"' -f4)
            echo "Attempt $attempt: $current_status"
            if [ "$current_status" = "RUNNING" ]; then
              echo "Pod RUNNING"
              exit 0
            fi
            sleep 5
          done
          exit 1