name: Gamma CI (Deterministic DAG)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  IMAGE_BASE: ghcr.io/nexusbayarea/lostbobo-simhpc-base

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (SHA only, digest captured)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/images/Dockerfile.base
          push: true
          tags: ${{ env.IMAGE_BASE }}:${{ github.sha }}

  dag:
    runs-on: ubuntu-latest
    needs: build

    outputs:
      matrix: ${{ steps.dag.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Compile DAG
        id: dag
        run: |
          python -m ci.dag_compiler > dag.json

          MATRIX=$(jq -c '.modules' dag.json)
          if [ "$MATRIX" = "null" ] || [ "$MATRIX" = "[]" ]; then
            MATRIX='["noop"]'
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  execute:
    runs-on: ubuntu-latest
    needs: [build, dag]

    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.dag.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Run module in container (digest locked)
        if: matrix.module != 'noop'
        run: |
          docker run --rm \
            -v $PWD:/app \
            -w /app \
            ${{ env.IMAGE_BASE }}@${{ needs.build.outputs.digest }} \
            python -m ci.kernel --module ${{ matrix.module }}

  manifest:
    runs-on: ubuntu-latest
    needs: [build, dag, execute]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Build manifest
        run: |
          python -m ci.dag_compiler > dag.json
          cat <<EOF > build-manifest.json
          {
            "git": {"sha": "${{ github.sha }}", "ref": "${{ github.ref }}"},
            "image": {
              "base": "${{ env.IMAGE_BASE }}",
              "digest": "${{ needs.build.outputs.digest }}"
            },
            "dag": $(cat dag.json),
            "status": "${{ needs.execute.result }}"
          }
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: build-manifest
          path: build-manifest.json
