name: Deploy Beta to RunPod

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            simhpcworker/simhpc-worker:latest
            simhpcworker/simhpc-worker:v2.5.3

      - name: Deploy to RunPod via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RUNPOD_SSH_HOST }}
          username: ${{ secrets.RUNPOD_SSH_USER }}
          key: ${{ secrets.RUNPOD_SSH_KEY }}
          port: ${{ secrets.RUNPOD_SSH_PORT }}
          script: |
            docker pull simhpcworker/simhpc-worker:latest
            docker stop simhpc-worker || true
            docker rm simhpc-worker || true
            docker run -d --name simhpc-worker \
              --gpus all \
              simhpcworker/simhpc-worker:latest
            echo "Container restarted with latest image"
