syntax = "proto3";

package simhpc.plugin;

service PluginHost {
  rpc ExecuteCapability (ExecuteRequest) returns (ExecuteResponse);
  rpc HealthCheck (HealthRequest) returns (HealthResponse);
  rpc RegisterCapabilities (RegisterRequest) returns (RegisterResponse);
}

message ExecuteRequest {
  string capability = 1;
  map<string, string> payload = 2;
  string tenant_id = 3;
}

message ExecuteResponse {
  bool success = 1;
  string result = 2;
  string error = 3;
}

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  repeated string plugins = 2;
}

message CapabilityInfo {
  string name = 1;
  string description = 2;
  string version = 3;
}

message RegisterRequest {
  string plugin_name = 1;
  string plugin_version = 2;
  repeated CapabilityInfo capabilities = 3;
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
}
