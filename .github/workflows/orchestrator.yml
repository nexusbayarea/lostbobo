name: SimHPC SaaS Orchestrator (v2.8.8)

on:
  push:
    branches: [main]

jobs:
  self-heal-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Self-Heal Codebase
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          /home/runner/.local/bin/uvx ruff check . --fix --select F401,I || true
          sed -i 's/import httpx/import httpx  # noqa: E402/g' app/services/worker/worker.py || true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Unified Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/images/Dockerfile.unified
          push: true
          tags: |
            ghcr.io/nexusbayarea/simhpc-unified:latest
            ghcr.io/nexusbayarea/simhpc-unified:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Reset RunPod Fleet
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ID: ${{ secrets.RUNPOD_ID }}
        run: |
          curl -s -X POST "https://api.runpod.io/graphql" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { podStop(input: { podId: \\\"$RUNPOD_ID\\\" }) { id } }\"}"
          
          sleep 15

          curl -s -X POST "https://api.runpod.io/graphql" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { podResume(input: { podId: \\\"$RUNPOD_ID\\\", gpuCount: 1 }) { id } }\"}"