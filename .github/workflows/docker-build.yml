# Update this section in .github/workflows/docker-build.yml
- name: Build and push (Worker Logic)
  id: build
  uses: docker/build-push-action@v5
  with:
    context: .
    file: backend/worker/worker.Dockerfile 
    push: true
    tags: |
      ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.sha_tag }}
      ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}:latest
    cache-from: type=gha
    cache-to: type=gha,mode=max
    platforms: linux/amd64
