name: Build Manifest Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/simhpc-base

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - id: image
        run: |
          IMAGE=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/images/Dockerfile.base
          push: true
          tags: ${{ needs.prepare.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  manifest:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    outputs:
      manifest: ${{ steps.manifest.outputs.manifest }}

    steps:
      - name: Generate manifest
        id: manifest
        run: |
          MANIFEST=$(cat <<EOF
          {
            "image": {
              "registry": "${{ needs.prepare.outputs.image }}",
              "digest": "${{ needs.build.outputs.digest }}"
            },
            "runtime": {
              "service_role": "unified"
            },
            "git": {
              "sha": "${{ github.sha }}"
            },
            "ci": {
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }
          }
          EOF
          )
          echo "manifest=$MANIFEST" >> $GITHUB_OUTPUT

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: build-manifest
          path: build-manifest.json