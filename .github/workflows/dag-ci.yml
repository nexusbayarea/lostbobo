name: Deterministic API CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

env:
  SB_URL: "http://localhost:8000"
  SB_TOKEN: "ci-stub-token"
  SB_SECRET_KEY: "ci-stub-secret"
  SB_JWT_SECRET: "ci-stub-jwt"
  SB_PUB_KEY: "ci-stub-pubkey"
  SB_DATA_URL: "http://localhost:8001"
  RUNTIME_MODE: "ci"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff==0.4.4

      # ✅ FIX: src layout safe
      - name: Run ruff
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ REQUIRED: installs src packages properly
      - name: Install dependencies
        run: pip install -e ".[dev]"

      # ✅ HARD VALIDATION: fails fast if packaging is wrong
      - name: Verify package import
        run: python -c "import app; print(app.__file__)"

      - name: Run pytest
        run: python -m pytest tests/ -q --tb=short

  api-ci:
    name: API CI
    runs-on: ubuntu-latest
    needs: [lint, tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # ✅ ensures this job also validates install correctness
      - name: Verify package import
        run: python -c "import app; print(app.__file__)"

      - name: Boot validation
        run: pytest tests/test_boot.py -xvs

      - name: Boot fail-fast validation
        run: pytest tests/test_boot_failfast.py -xvs

      - name: Run dependency drift check
        run: python tools/check_dependency_drift.py
        env:
          DRIFT_TEST_IMPORT: "app.core.config"

      - name: DAG system tests
        run: pytest tests/test_dag.py -xvs

    outputs:
      sha: ${{ github.sha }}

  worker-build:
    name: Worker Build
    runs-on: ubuntu-latest
    needs: api-ci

    steps:
      - uses: actions/checkout@v4

      - name: Validate Dockerfile exists
        run: |
          echo "Building worker for SHA: ${{ needs.api-ci.outputs.sha }}"
          test -f docker/images/Dockerfile.unified || \
            (echo "❌ docker/images/Dockerfile.unified not found" && exit 1)
          echo "✅ Dockerfile present"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — CI validation only)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/images/Dockerfile.unified
          push: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [api-ci, worker-build]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Trigger hardened build & push
        run: |
          echo "All upstream checks passed for SHA: ${{ github.sha }}"
          echo "Triggering hardened-build-push workflow."
