name: CI Kernel

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: read
  packages: write

jobs:
  kernel:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/images/Dockerfile.base
          push: true
          tags: ghcr.io/nexusbayarea/lostbobo-simhpc-base:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run CI Kernel
        run: |
          docker run --rm \
            -v $PWD:/app \
            -w /app \
            -e SB_URL=http://test \
            -e SB_DATA_URL=http://test \
            -e SB_JWT_SECRET=test \
            -e SB_PUB_KEY=test \
            -e SB_SECRET_KEY=test \
            -e SB_TOKEN=test \
            ghcr.io/nexusbayarea/lostbobo-simhpc-base:stable \
            python ci/kernel.py