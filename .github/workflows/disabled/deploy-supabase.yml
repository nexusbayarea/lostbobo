name: Deploy Supabase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Supabase env
        env:
          SB_ACCESS_TOKEN: ${{ secrets.SB_ACCESS_TOKEN }}
          SB_PROJECT_ID: ${{ secrets.SB_PROJECT_ID }}
          SB_DB_PASSWORD: ${{ secrets.SB_DB_PASSWORD }}
        run: |
          if [ -z "$SB_ACCESS_TOKEN" ]; then
            echo "Missing SB_ACCESS_TOKEN"
            exit 1
          fi
          if [ -z "$SB_PROJECT_ID" ]; then
            echo "Missing SB_PROJECT_ID"
            exit 1
          fi
          echo "Supabase env validated"

      - name: Deploy to Production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SB_ACCESS_TOKEN }}
          SB_PROJECT_ID: ${{ secrets.SB_PROJECT_ID }}
          SB_DB_PASSWORD: ${{ secrets.SB_DB_PASSWORD }}
        run: |
          supabase link --project-ref "$SB_PROJECT_ID" --password "$SB_DB_PASSWORD"
          supabase db push --password "$SB_DB_PASSWORD"
          supabase functions deploy --project-ref "$SB_PROJECT_ID"