name: Deploy to RunPod

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Pod action'
        required: true
        default: 'restart'
        type: choice
        options:
          - restart
          - stop
          - start

jobs:
  deploy-runpod:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Initialize Infisical
        run: |
          infisical init --projectId=f8464ba0-1b93-45a1-86b5-c8ea5a81a2a4 --plaintext-output || true

      - name: Install Python and RunPod SDK
        run: |
          sudo apt-get install -y python3 python3-pip
          pip3 install runpod

      - name: Deploy to RunPod
        run: |
          infisical run --projectId=f8464ba0-1b93-45a1-86b5-c8ea5a81a2a4 --env=prod -- python3 -c "
import runpod
import os

pod_id = os.getenv('RUNPOD_ID')
action = os.getenv('ACTION', 'restart')

print(f'=== Pod ID: {pod_id}')
print(f'=== Action: {action}')

if action == 'restart':
    print(f'Restarting pod {pod_id}...')
    result = runpod.restart_pod(pod_id)
elif action == 'stop':
    print(f'Stopping pod {pod_id}...')
    result = runpod.stop_pod(pod_id)
elif action == 'start':
    print(f'Starting pod {pod_id}...')
    result = runpod.resume_pod(pod_id)

print(f'=== Result: {result}')
print('Pod action completed successfully')
"
        env:
          ACTION: ${{ github.event.inputs.action }}
