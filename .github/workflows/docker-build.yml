name: "v3.5.0 Hardened Build & Push"
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: {}
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nexusbayarea/simhpc-worker
permissions:
  contents: read
  packages: write
  id-token: write
jobs:
  build-and-push:
    name: Build and Push Worker Image
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_tag_sha: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metadata
        id: meta
        run: |
          LOWER_IMAGE=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$LOWER_IMAGE" >> $GITHUB_OUTPUT
          echo "sha_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push (Worker Logic)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: worker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.sha_tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64


      - name: Record build metadata
        run: |
          mkdir -p build-metadata
          echo "{\"sha\": \"${{ github.sha }}\", \"digest\": \"${{ steps.build.outputs.digest }}\", \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > build-metadata/build.json

      - name: Upload metadata
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata-${{ github.sha }}
          path: build-metadata/

  promote-to-prod:
    name: Promote to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote SHA tag to prod
        run: |
          IMAGE_BASE="${{ env.REGISTRY }}/$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')"
          docker pull $IMAGE_BASE:${{ needs.build-and-push.outputs.image_tag_sha }}
          docker tag $IMAGE_BASE:${{ needs.build-and-push.outputs.image_tag_sha }} $IMAGE_BASE:prod
          docker push $IMAGE_BASE:prod
