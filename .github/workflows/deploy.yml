name: "v2.5.0 Production Deployment"

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job 1: The Quality Gate
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Lint Check
        run: ruff check services/worker/worker.py services/api/api.py

      - name: Format Check
        run: ruff format --check services/worker/worker.py services/api/api.py
