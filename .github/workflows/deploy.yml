name: Deploy SimHPC

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PW_TOKEN }}

      - name: Build & Push Unified Image
        run: |
          docker build -f Dockerfile.unified -t simhpcworker/simhpc-unified:latest .
          docker push simhpcworker/simhpc-unified:latest

      - name: Deploy to RunPod (resilient podReset with fallback)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ID: ${{ secrets.RUNPOD_ID }}
        run: |
          echo "Targeting Pod: $RUNPOD_ID"
          
          # 1. ATTEMPT POD RESET
          echo "--- Attempting podReset ---"
          RESET_RESP=$(curl -s -X POST "https://api.runpod.io/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -d "{\"query\": \"mutation { podReset(input: { podId: \\\"$RUNPOD_ID\\\" }) { id } }\"}")
          echo "Reset Response: $RESET_RESP"

          # Check if Reset succeeded
          if echo "$RESET_RESP" | grep -q "\"errors\"" || [[ -z "$RESET_RESP" ]]; then
            echo "podReset failed or returned error. Triggering fallback cycle..."
            
            # 2. FALLBACK: STOP
            echo "--- Fallback Stage 1: Stopping Pod ---"
            STOP_RESP=$(curl -s -X POST "https://api.runpod.io/graphql" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -d "{\"query\": \"mutation { podStop(input: { podId: \\\"$RUNPOD_ID\\\" }) { id } }\"}")
            echo "Stop Response: $STOP_RESP"
            
            sleep 15
            
            # 3. FALLBACK: RESUME
            echo "--- Fallback Stage 2: Resuming Pod ---"
            RESUME_RESP=$(curl -s -X POST "https://api.runpod.io/graphql" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -d "{\"query\": \"mutation { podResume(input: { podId: \\\"$RUNPOD_ID\\\", gpuCount: 1 }) { id } }\"}")
            echo "Resume Response: $RESUME_RESP"

            if echo "$RESUME_RESP" | grep -q "\"errors\""; then
              echo "Critical Error: Both Reset and Resume failed."
              exit 1
            fi
            echo "Pod successfully cycled (Stop -> Resume)"
          else
            echo "Pod reset successfully on the first try"
          fi