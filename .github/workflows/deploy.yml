name: Deploy SimHPC

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PW_TOKEN }}

      - name: Build & Push Unified Image
        run: |
          docker build -f Dockerfile.unified -t simhpcworker/simhpc-unified:latest .
          docker push simhpcworker/simhpc-unified:latest

      - name: Deploy to RunPod (API)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ID: ${{ secrets.RUNPOD_ID }}
        run: |
          echo "Stopping pod: $RUNPOD_ID"
          
          response=$(curl -s -X POST "https://api.runpod.io/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -d "{\"query\": \"mutation { podStop(input: { podId: \\\"$RUNPOD_ID\\\" }) { id status } }\"}")
          
          echo "Stop response: $response"
          
          sleep 3
          
          echo "Starting pod: $RUNPOD_ID"
          
          response=$(curl -s -X POST "https://api.runpod.io/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -d "{\"query\": \"mutation { podStart(input: { podId: \\\"$RUNPOD_ID\\\" }) { id status } }\"}")
          
          echo "Start response: $response"
          
          echo "Restart response: $response"
          
          if echo "$response" | jq -e '.errors' > /dev/null 2>&1; then
            echo "API Error detected"
            exit 1
          fi
          
          echo "Pod restart triggered"

      - name: Wait for pod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ID: ${{ secrets.RUNPOD_ID }}
        run: |
          attempt=0
          
          while [ $attempt -lt 30 ]; do
            attempt=$((attempt + 1))
            
            response=$(curl -s -X POST "https://api.runpod.io/graphql" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -d "{\"query\": \"query { pod(input: { podId: \\\"$RUNPOD_ID\\\" }) { id status } }\"}")
            
            echo "Attempt $attempt: $response"
            
            status=$(echo "$response" | jq -r '.data.pod.status // empty')
            
            if [ "$status" = "RUNNING" ]; then
              echo "Pod is RUNNING"
              exit 0
            fi
            
            if [ -n "$status" ]; then
              echo "Current status: $status"
            fi
            
            sleep 5
          done
          
          echo "Pod did not reach RUNNING state"
          exit 1