name: Deploy SimHPC

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PW_TOKEN }}

      - name: Build & Push Image
        run: |
          docker build -t simhpcworker/simhpc-unified:latest .
          docker push simhpcworker/simhpc-unified:latest

      - name: Deploy to RunPod (API)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ID: ${{ secrets.RUNPOD_ID }}
        run: |
          echo "Restarting pod: $RUNPOD_ID"
          
          response=$(curl -s -X POST "https://api.runpod.io/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -d "{\"query\": \"mutation { podRestart(podId: \\"$RUNPOD_ID\\") { id status } }\"}")
          
          echo "Response: $response"
          
          if echo "$response" | grep -q "\"errors\""; then
            echo "Error restarting pod"
            exit 1
          fi
          
          echo "Pod restarted successfully"

      - name: Wait for pod to be ready
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ID: ${{ secrets.RUNPOD_ID }}
        run: |
          echo "Waiting for pod to be ready..."
          attempt=0
          max_attempts=30
          
          while [ $attempt -lt $max_attempts ]; do
            attempt=$((attempt + 1))
            
            status_response=$(curl -s -X POST "https://api.runpod.io/graphql" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -d "{\"query\": \"query { pod(input: { podId: \\"$RUNPOD_ID\\"}) { id status } }\"}")
            
            current_status=$(echo "$status_response" | grep -o "\"status\":\"[^\"]*\"" | head -1 | cut -d'"' -f4)
            echo "Attempt $attempt/$max_attempts: $current_status"
            
            if [ "$current_status" = "RUNNING" ]; then
              echo "Pod is RUNNING"
              exit 0
            fi
            
            sleep 5
          done
          
          echo "Pod did not start in time"
          exit 1

      - name: Verify deployment
        env:
          RUNPOD_ID: ${{ secrets.RUNPOD_ID }}
        run: |
          echo "=== Deployment Complete ==="
          echo "Pod ID: $RUNPOD_ID"
          echo "Image: simhpcworker/simhpc-unified:latest"
          echo "URL: https://$RUNPOD_ID-8888.proxy.runpod.net"