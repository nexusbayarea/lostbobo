name: CI Kernel

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/nexusbayarea/lostbobo-simhpc-base

jobs:
  kernel:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate image naming
        run: |
          if echo "$IMAGE_NAME" | grep -q '[A-Z]'; then
            echo "ERROR: uppercase detected in image name"
            exit 1
          fi
          echo "Image name validated: $IMAGE_NAME"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/images/Dockerfile.base
          push: true
          tags: ${{ env.IMAGE_NAME }}:stable

      - name: Run CI Kernel
        run: |
          docker run --rm \
            -v $PWD:/app \
            -w /app \
            -e SB_URL=http://test \
            -e SB_DATA_URL=http://test \
            -e SB_JWT_SECRET=test \
            -e SB_PUB_KEY=test \
            -e SB_SECRET_KEY=test \
            -e SB_TOKEN=test \
            ${{ env.IMAGE_NAME }}:stable \
            python ci/kernel.py