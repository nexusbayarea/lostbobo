name: Unified Kernel CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  kernel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      RUNTIME_MODE: ci
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Smoke test CI runner
        run: python -c "import tools.run_ci; print('[SMOKE] run_ci.py imports OK')"

      - name: Run Kernel CI via Makefile
        run: make ci

      - name: Strict Validation (Read-Only Phase)
        run: make check
