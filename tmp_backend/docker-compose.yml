version: '3.8'

services:
  # The FastAPI Orchestrator
  api:
    image: simhpc/api:latest
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=https://simhpc-frontend.vercel.app
    depends_on:
      - redis
    networks:
      - backend

  # The Physics Worker (A40 GPU Access)
  worker:
    image: simhpc/physics-worker:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - sim_data:/app/data
    depends_on:
      - redis
    networks:
      - backend

  # Message Broker & Telemetry Store
  redis:
    image: redis:7-alpine
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  sim_data:
