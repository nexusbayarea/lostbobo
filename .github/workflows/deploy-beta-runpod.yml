name: BETA Deployment (Secret-Ops)

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # v2.5.2 Standards

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Install Infisical CLI to pull build-time secrets
      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo bash
          sudo apt-get install -y infisical

      # 2. Login & Build using Infisical Token
      - name: Docker Login & Build
        shell: bash
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          infisical run --env="beta" -- bash -c '
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker build -t $DOCKERHUB_USERNAME/core-defense-app:latest .
            docker push $DOCKERHUB_USERNAME/core-defense-app:latest
          '

      # 3. Deploy to RunPod via SSH (Secrets Injected to Memory)
      - name: Deploy to RunPod
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RUN_POD_SSH_HOST }}
          username: ${{ secrets.RUN_POD_SSH_USER }}
          key: ${{ secrets.RUN_POD_SSH_KEY }}
          port: ${{ secrets.RUN_POD_SSH_PORT }}
          envs: INFISICAL_TOKEN
          script: |
            # Pull the latest image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/core-defense-app:latest
            # Restart with Infisical Token passed as an ENV
            docker stop core-defense || true
            docker rm core-defense || true
            docker run -d --name core-defense \
              --gpus all \
              -e INFISICAL_TOKEN="$INFISICAL_TOKEN" \
              ${{ secrets.DOCKERHUB_USERNAME }}/core-defense-app:latest
