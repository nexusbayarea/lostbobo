name: Build and Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - gateway
          - rag-service
          - module-runtime
          - worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/simhpc-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/simhpc-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose -f deployment/docker-compose.yml up -d
          sleep 15
          bash deployment/scripts/validate-cpu.sh || sleep 15

      - name: Run integration tests
        run: |
          pip install pytest httpx grpcio
          pytest tests/integration/ -v

      - name: Cleanup
        if: always()
        run: docker compose -f deployment/docker-compose.yml down

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export INFISICAL_CLIENT_ID="${{ secrets.INFISICAL_CLIENT_ID }}"
            export INFISICAL_CLIENT_SECRET="${{ secrets.INFISICAL_CLIENT_SECRET }}"
            export INFISICAL_PROJECT_ID="${{ secrets.INFISICAL_PROJECT_ID }}"
            export INFISICAL_ENV="production"
            cd /mnt/simhpc_vps/simhpc-gamma
            git pull origin main
            docker compose -f deployment/docker-compose.yml pull
            docker compose -f deployment/docker-compose.yml up -d --remove-orphans
            bash deployment/scripts/validate-cpu.sh
