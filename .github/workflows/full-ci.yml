name: Full CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache uv environment (full)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-full-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-full-

      - name: Install uv
        run: pip install uv

      - name: Install all deps
        run: uv pip install -e .[dev,worker]

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q