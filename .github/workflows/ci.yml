name: Unified Deterministic CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      RUNTIME_MODE: ci
      SB_URL: http://localhost:8080
      SB_TOKEN: ci-stub-token
      SB_SECRET_KEY: ci-stub-secret
      SB_JWT_SECRET: ci-stub-jwt
      SB_PUB_KEY: ci-stub-pubkey
      SB_DATA_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Smoke test CI runner
        run: python -c "import tools.run_ci; print('[SMOKE] run_ci.py imports OK')"

      - name: Run Full CI
        run: bash ci.sh