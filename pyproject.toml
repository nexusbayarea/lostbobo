[project]
name = "simhpc"
version = "2.7.2"
description = "SimHPC Unified Platform - Simulation backend for API + GPU workers + autoscaler"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "NexusBayArea", email = "nexusbayarea@gmail.com" }
]
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.29.0",
    "python-dotenv>=1.0.1",
    "redis>=4.5.0",
    "pydantic>=2.6.4",
    "httpx>=0.27.0",
    "supabase>=2.4.0",
    "postgrest>=0.16.0",
    "python-jose[cryptography]>=3.3.0",
    "psycopg2-binary>=2.9.0",
    "asyncpg>=0.29.0",
    "websockets>=12.0",
    "tenacity>=8.2.3",
    "orjson>=3.10.1",
    "loguru>=0.7.2",
    "structlog>=23.0.0",
    "prometheus-client>=0.17.0",
    "python-multipart>=0.0.6",
    "passlib[bcrypt]>=1.7.4",
    "requests>=2.31.0",
]

[project.optional-dependencies]
worker = [
    "numpy>=1.24.0",
    "scipy>=1.10.0",
    "fpdf2>=2.7.0",
    "openai>=1.0.0",
    "stripe>=5.0.0",
    "tiktoken>=0.5.0",
    "matplotlib>=3.7.0",
    "gunicorn>=21.0.0",
    "celery>=5.3.0",
]
gpu = [
    "torch>=2.0.0",
]
dev = [
    "ruff>=0.1.0",
    "pytest>=7.0.0",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "B", "I"]
ignore = ["E402"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = []
