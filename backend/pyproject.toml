[tool.ruff]
line-length = 120

[tool.ruff.lint]
ignore = ["E402", "B008"]
select = ["E", "F", "B", "UP"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.setuptools]
packages = ["app", "packages", "autoscaler", "compiler", "data", "infra", "tools", "worker"]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"
