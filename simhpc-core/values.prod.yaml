# Production values for SimHPC Core Engine
replicaCount: 3

image:
  repository: your-registry/simhpc-core
  pullPolicy: Always
  tag: "2026.05.10"

service:
  type: ClusterIP
  port: 8000

# GPU Scheduling (Production settings)
gpu:
  enabled: true
  count: 1.0
  fractional:
    enabled: true
    max_shared_per_gpu: 8
  mps:
    enabled: true
    activeThreadPercentage: 92
  mig:
    enabled: false
  nodeSelector:
    nvidia.com/gpu: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  resources:
    requests:
      nvidia.com/gpu: "1"
      cpu: "4"
      memory: "16Gi"
    limits:
      nvidia.com/gpu: "1"
      cpu: "8"
      memory: "32Gi"

ingress:
  enabled: true
  className: nginx
  host: simhpc.yourcompany.com
  tls:
    enabled: true
    secretName: simhpc-tls

supabase:
  url: "https://your-project-ref.supabase.co"
  key: ""

infisical:
  token: ""
  projectId: "your-project-id"
  environment: "production"

env:
  INFISICAL_TOKEN: ""
  INFISICAL_PROJECT_ID: ""
  SUPABASE_URL: ""
  SUPABASE_SERVICE_KEY: ""
  EVENT_BUS_MAX_QUEUE_DEPTH: "5000"

resources:
  requests:
    cpu: "4"
    memory: "16Gi"
  limits:
    cpu: "12"
    memory: "48Gi"

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 2

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Karpenter Integration
karpenter:
  enabled: true
  nodePools:
    - name: gpu-general
      instanceFamily: ["g4dn", "g5", "p3", "p4d", "p5", "g6"]
      capacityType: ["spot", "on-demand"]
      minSize: 3
      maxSize: 40
      spotPriority: true
    - name: gpu-high-mem
      instanceFamily: ["p4d", "p5"]
      capacityType: ["on-demand"]
      minSize: 1
      maxSize: 12
    - name: gpu-isolated
      instanceFamily: ["p4d", "p5"]
      capacityType: ["on-demand"]
      minSize: 2
      maxSize: 8

# Monitoring
monitoring:
  gpu:
    enabled: true

# Cost Optimization
costOptimization:
  spotPriority: true
  spotThreshold: 0.4
  minSpotSavings: 0.6
