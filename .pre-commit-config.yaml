repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
    exclude: ^(apps/frontend|everything-claude-code|supabase\.gitignore|supabase/config\.toml|supabase/migrations|supabase/functions|docs|legacy_archive|packages|services/skills)/
