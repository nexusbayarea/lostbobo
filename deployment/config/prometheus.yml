global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "gateway"
    static_configs:
      - targets: ["gateway-service:8080"]
    metrics_path: "/metrics"

  - job_name: "rag-service"
    static_configs:
      - targets: ["rag-service:50051"]
    metrics_path: "/metrics"

  - job_name: "module-runtime"
    static_configs:
      - targets: ["module-runtime:50052"]
    metrics_path: "/metrics"

  - job_name: "worker-service"
    static_configs:
      - targets: ["worker-service:8000"]
    metrics_path: "/metrics"
