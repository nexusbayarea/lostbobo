name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Setup uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Create venv and install ruff
        run: |
          uv venv
          uv pip install ruff

      - name: Lint
        run: uv run ruff check .

      - name: Build Image
        run: |
          docker build -f docker/images/Dockerfile.unified \
            -t ghcr.io/${{ github.repository }}/simhpc-unified:latest .
      - name: Push Image
        run: |
          docker push ghcr.io/${{ github.repository }}/simhpc-unified:latest
      - name: Deploy (RunPod or other)
        run: |
          echo "Deploy step here (pod restart, etc.)"
