name: Deploy Beta to RunPod

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo bash
          sudo apt-get update && sudo apt-get install -y infisical
          sudo infisical upgrade

      - name: Init Infisical Project
        run: |
          echo '{"workspaceId":"f8464ba0-1b93-45a1-86b5-c8ea5a81a2a4","defaultEnvironment":"beta"}' > .infisical.json

      - name: Load Secrets from Infisical
        shell: bash
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          export INFISICAL_TOKEN=$INFISICAL_TOKEN
          infisical export --env=beta --projectId=f8464ba0-1b93-45a1-86b5-c8ea5a81a2a4 --format=dotenv | while read -r line; do
            echo "$line" >> "$GITHUB_ENV"
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PW_TOKEN }}
      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            simhpcworker/simhpc-worker:latest
            simhpcworker/simhpc-worker:v2.5.3

      - name: Deploy to RunPod via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.RUNPOD_SSH_HOST }}
          username: ${{ env.RUNPOD_SSH_USER }}
          key: ${{ env.RUNPOD_SSH_KEY }}
          port: ${{ env.RUNPOD_SSH_PORT }}
          script: |
            docker pull simhpcworker/simhpc-worker:latest
            docker stop simhpc-worker || true
            docker rm simhpc-worker || true
            docker run -d --name simhpc-worker \
              --gpus all \
              simhpcworker/simhpc-worker:latest
            echo "Container restarted with latest image"
