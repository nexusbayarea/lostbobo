name: SimHPC Production Deploy (v2.6.5)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PW_TOKEN }}

      - name: Build and Push Unified Image
        run: |
          docker build -f Dockerfile.unified -t simhpcworker/simhpc-unified:latest .
          docker push simhpcworker/simhpc-unified:latest

      - name: Orchestrate RunPod Lifecycle
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ID: ${{ secrets.RUNPOD_ID }}
        run: |
          echo "Targeting Pod: $RUNPOD_ID"
          
          # --- STAGE 1: PRIMARY RESET ---
          # This is the cleanest way to force a fresh image pull
          echo "Attempting podReset (v2.6.5 Protocol)..."
          RESPONSE=$(curl -s -X POST "https://api.runpod.io/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -d "{\"query\": \"mutation { podReset(input: { podId: \\\"$RUNPOD_ID\\\" }) { id } }\"}")
          
          echo "API Response: $RESPONSE"

          # Check for errors (Internal Server Error or missing Pod)
          if echo "$RESPONSE" | grep -q "\"errors\"" || [[ -z "$RESPONSE" ]]; then
            echo "⚠️ podReset failed. Entering Fallback Cycle (Stop -> Resume)..."
            
            # --- STAGE 2: FALLBACK STOP ---
            echo "Stopping pod to clear orchestrator state..."
            curl -s -X POST "https://api.runpod.io/graphql" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -d "{\"query\": \"mutation { podStop(input: { podId: \\\"$RUNPOD_ID\\\" }) { id } }\"}"
            
            echo "Waiting 20 seconds for GPU release..."
            sleep 20
            
            # --- STAGE 3: FALLBACK RESUME ---
            echo "Resuming pod to pull latest image..."
            RESUME_RESP=$(curl -s -X POST "https://api.runpod.io/graphql" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -d "{\"query\": \"mutation { podResume(input: { podId: \\\"$RUNPOD_ID\\\", gpuCount: 1 }) { id } }\"}")
            
            echo "Resume Response: $RESUME_RESP"

            if echo "$RESUME_RESP" | grep -q "\"errors\""; then
              echo "❌ CRITICAL: Fallback failed. Manually check Pod ID $RUNPOD_ID."
              exit 1
            fi
            echo "✅ Deployment successful via Fallback Cycle."
          else
            echo "✅ Deployment successful via podReset."
          fi
