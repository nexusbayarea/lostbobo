name: CI Validation Gateway

on:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auth with GHCR
        run: |
          # Uses the GIT_TOKEN synced from Infisical to your GitHub Secrets
          echo "${{ secrets.GIT_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push SimHPC Image
        run: |
          # Builds the image using the root context
          docker build -f Dockerfile.unified -t ghcr.io/lostbobo/simhpc_unified:latest .
          docker push ghcr.io/lostbobo/simhpc_unified:latest

      - name: Update RunPod Template
        run: |
          cd backend
          # Ensure RUNPOD_API_KEY is available in your synced GitHub Secrets
          export RUNPOD_API_KEY=${{ secrets.RUNPOD_API_KEY }}
          python tools/update_runpod.py
