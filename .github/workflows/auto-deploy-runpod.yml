name: Auto-Deploy to RunPod (Post-Image-Push)

on:
  workflow_run:
    workflows:
      - Deploy Worker
      - Deploy Autoscaler
    types:
      - completed
    branches:
      - main

jobs:
  auto-deploy-runpod:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Restart RunPod to pull new image
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          infisical run --env="prod" -- bash -c '

            echo "Restarting pod to pull new image..."
            
            response=$(curl -s -X POST "https://api.runpod.io/graphql" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -d '"'"'{"query": "mutation { podRestart(podId: \"'"$RUNPOD_POD_ID"'\") { id status } }"}'"'"')
            
            echo "Restart response: $response"
            
            if echo "$response" | grep -q '"errors"'; then
              echo "Error: GraphQL errors detected"
              echo "$response"
              exit 1
            fi
            
            echo "Pod restarted - new image will be pulled"
          '

      - name: Wait for pod to be ready
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          infisical run --env="prod" -- bash -c '
            echo "Waiting for pod to come back up..."
            max_attempts=30
            attempt=0
            
            while [ $attempt -lt $max_attempts ]; do
              attempt=$((attempt + 1))
              
              status_response=$(curl -s -X POST "https://api.runpod.io/graphql" \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer $RUNPOD_API_KEY" \
                -d '"'"'{"query": "query { pod(input: { podId: \"'"$RUNPOD_POD_ID"'\") { id status } }"}'"'"')
              
              current_status=$(echo "$status_response" | grep -o '"status":"[^"]*"' | head -1 | cut -d'"'"':'"'"' -f4)
              echo "Attempt $attempt/$max_attempts: Pod status = $current_status"
              
              if [ "$current_status" = "RUNNING" ]; then
                echo "Pod is now RUNNING"
                exit 0
              fi
              
              sleep 5
            done
            
            echo "Pod did not come back within expected time"
            exit 1
          '

      - name: Report deployment status
        run: |
          echo "=== Deployment Complete ==="
          echo "Workflow: ${{ github.event.workflow_run.name }}"
          echo "Image deployed: ${{ env.IMAGE_NAME }}"
          echo "Status: SUCCESS"
