name: "v3.5.0 Deterministic Pipeline"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # 1. INTEGRITY GATE: Lockfiles and Fingerprints
  integrity-check:
    name: Integrity & Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -Ls https://astral.sh/uv/install.sh | sh
      - name: Verify Dependency Drift
        run: |
          uv pip compile backend/requirements.txt --dry-run
      - name: Verify System Contract (Local)
        run: python3 backend/tools/ci_gates/system_contract.py
    outputs:
      status: ${{ job.status }}

  # 2. API CONTRACT GATE: Fast-fail the Backend
  api-ci:
    name: API Contract
    needs: integrity-check
    runs-on: ubuntu-latest
    if: needs.integrity-check.outputs.status == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Run Pytest (Contract/DAG Marks)
        run: |
          pytest -m "dag or api" backend/
    outputs:
      ci_status: "success"
      sha: ${{ github.sha }}

  # 3. WORKER BUILD: Only if API is valid
  worker-build:
    name: Build Hardened Worker
    needs: api-ci
    runs-on: ubuntu-latest
    if: needs.api-ci.outputs.ci_status == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Build & Push GHCR
        run: |
          echo "Building worker for immutable SHA: ${{ needs.api-ci.outputs.sha }}"
          # Triggering the existing hardened build workflow logic implicitly
          # via workflow caller or CLI as configured in your platform-level CI
          python3 backend/scripts/build.py --sha ${{ needs.api-ci.outputs.sha }}
    outputs:
      build_status: "success"

  # 4. DEPLOYMENT: The Final Release
  deploy:
    name: Production Release
    needs: [api-ci, worker-build]
    if: github.ref == 'refs/heads/main' && needs.api-ci.outputs.ci_status == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Update Supabase Skill Registry
        run: |
          echo "Promoting SHA ${{ github.sha }} to active skill set"
