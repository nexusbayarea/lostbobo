name: Auto-Deploy to RunPod (Post-Image-Push)

on:
  workflow_run:
    workflows: ["Deploy to Docker Hub"]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-deploy-runpod:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to RunPod via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RUNPOD_SHH_TCP }}
          port: ${{ secrets.RUNPOD_TCP_PORT_22 }}
          username: ${{ secrets.RUNPOD_USERNAME }}
          key: ${{ secrets.RUNPOD_SSH_KEY }}
          script: |
            docker pull simhpcworker/simhpc-unified:latest
            docker stop simhpc-unified || true
            docker rm simhpc-unified || true
            docker run -d --name simhpc-unified --gpus all simhpcworker/simhpc-unified:latest
            echo "SimHPC Unified Container restarted on port 22167 relay"