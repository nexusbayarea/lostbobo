name: Deploy to Docker Hub

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PW_TOKEN }}

      - name: Build and Push Unified Image
        run: |
          docker build -f Dockerfile.unified -t simhpcworker/simhpc-unified:latest .
          docker push simhpcworker/simhpc-unified:latest

      - name: Build and Push Worker Image
        run: |
          docker build -f Dockerfile.worker -t simhpcworker/simhpc-worker:latest .
          docker push simhpcworker/simhpc-worker:latest

      - name: Build and Push Autoscaler Image
        run: |
          docker build -f Dockerfile.autoscaler -t simhpcworker/simhpc-autoscaler:latest .
          docker push simhpcworker/simhpc-autoscaler:latest

      - name: Debug RunPod secrets
        run: |
          echo "=== Checking Available Secrets ==="
          echo "RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY != '' }}"
          echo "RUNPOD_ID: ${{ secrets.RUNPOD_ID != '' }}"
          echo "RUNPOD_SSH: ${{ secrets.RUNPOD_SSH != '' }}"
          echo "RUNPOD_SHH_TCP: ${{ secrets.RUNPOD_SHH_TCP != '' }}"
          echo "RUNPOD_TCP_PORT_22: ${{ secrets.RUNPOD_TCP_PORT_22 != '' }}"
          echo "RUNPOD_SSH_KEY: ${{ secrets.RUNPOD_SSH_KEY != '' }}"
          echo "RUNPOD_USERNAME: ${{ secrets.RUNPOD_USERNAME != '' }}"

      - name: Deploy to RunPod via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RUNPOD_SSH || secrets.RUNPOD_SHH_TCP }}
          username: ${{ secrets.RUNPOD_USERNAME || 'root' }}
          key: ${{ secrets.RUNPOD_SSH_KEY }}
          port: ${{ secrets.RUNPOD_TCP_PORT_22 || '22' }}
          script: |
            docker pull simhpcworker/simhpc-unified:latest
            docker stop simhpc-unified || true
            docker rm simhpc-unified || true
            docker run -d --name simhpc-unified --gpus all simhpcworker/simhpc-unified:latest
            echo "Container restarted with latest image"