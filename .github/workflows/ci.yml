name: Declarative CI

on:
  push:
  pull_request:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pyyaml

      - name: Run CI DAG
        run: |
          python ci/runner.py
