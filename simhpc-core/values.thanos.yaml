# values.thanos.yaml - Full Thanos Helm Values
thanos:
  enabled: true
  image:
    repository: quay.io/thanos/thanos
    tag: v0.36.1
    pullPolicy: IfNotPresent

  # Object Storage
  objstore:
    type: s3
    config:
      bucket: "simhpc-thanos"
      endpoint: "s3.us-east-1.amazonaws.com"
      region: "us-east-1"
      access_key: ""
      secret_key: ""

  # Sidecar
  sidecar:
    enabled: true
    prometheusUrl: "http://prometheus-operated.monitoring.svc.cluster.local:9090"
    resources:
      requests:
        cpu: "300m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"

  # Querier
  querier:
    enabled: true
    replicas: 3
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
    service:
      type: ClusterIP
      port: 9090

  # Query Frontend
  queryFrontend:
    enabled: true
    replicas: 2
    resources:
      requests:
        cpu: "400m"
        memory: "768Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
    cache:
      enabled: true
      type: memcached
      memcached:
        addresses: ["memcached.monitoring.svc.cluster.local:11211"]

  # Store Gateway
  storeGateway:
    enabled: true
    replicas: 2
    resources:
      requests:
        cpu: "500m"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "6Gi"
    persistence:
      enabled: true
      size: 50Gi

  # Compactor
  compactor:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "8Gi"
    persistence:
      enabled: true
      size: 100Gi
    retention:
      raw: 90d
      "5m": 365d
      "1h": 730d
    compaction:
      interval: 30m
      consistencyDelay: 30m

  # Ruler
  ruler:
    enabled: true
    replicas: 2
    resources:
      requests:
        cpu: "400m"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "3Gi"
    alertmanagers:
      - "http://alertmanager.monitoring.svc.cluster.local:9093"

  # Global
  global:
    commonLabels:
      app: thanos
      environment: production

  # Resources
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "4Gi"
