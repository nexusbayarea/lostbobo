name: CI Kernel

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  kernel:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore DAG cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: dag-${{ github.sha }}
          restore-keys: dag-

      - name: Enforce immutable image tags
        run: |
          set -e
          VIOLATIONS=$(grep -Rh --include="*.yml" -E 'ghcr\.io/.+:(latest|stable)\b' .github/workflows/ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: mutable image tags (:latest, :stable) forbidden"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "OK: immutable tagging enforced"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (temp tag)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/images/Dockerfile.base
          push: true
          tags: ghcr.io/nexusbayarea/lostbobo-simhpc-base:build-temp

      - name: Capture digest
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          echo "IMAGE_REF=ghcr.io/nexusbayarea/lostbobo-simhpc-base@${DIGEST}" >> $GITHUB_ENV
          echo "Digest captured: ${DIGEST}"

      - name: Compute DAG
        run: python ci/dag_compiler.py > dag.json

      - name: Build manifest (digest-only)
        run: |
          cat <<EOF > build-manifest.json
          {
            "git": {"sha": "${{ github.sha }}"},
            "image": {
              "ref": "${{ env.IMAGE_REF }}",
              "digest": "${{ steps.build.outputs.digest }}"
            },
            "dag": $(cat dag.json),
            "runtime": {"service_role": "unified"},
            "cache": {"enabled": true}
          }
          EOF

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: build-manifest
          path: build-manifest.json

      - name: Save DAG cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: dag-${{ github.sha }}

      - name: Run CI Kernel (digest-only)
        run: |
          docker pull $IMAGE_REF
          docker run --rm \
            -v $PWD:/app \
            -w /app \
            -e SB_URL=http://test \
            -e SB_DATA_URL=http://test \
            -e SB_JWT_SECRET=test \
            -e SB_PUB_KEY=test \
            -e SB_SECRET_KEY=test \
            -e SB_TOKEN=test \
            $IMAGE_REF \
            python ci/kernel.py

