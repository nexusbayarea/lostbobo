apiVersion: 1
groups:
  - orgId: 1
    name: SimHPC Tracing Alerts
    folder: SimHPC
    interval: 1m
    rules:
      - uid: high-trust-latency
        title: High Trust Runtime Latency (Traces)
        condition: B
        data:
          - refId: A
            datasourceUid: jaeger
            queryType: traceql
            query: '{name="trust.verify"} | latency > 4s'
            relativeTimeRange: { from: 600, to: 0 }
          - refId: B
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: { type: gt, params: [0] }
                  operator: { type: and }
                  query: A
                  reducer: { type: count }
              type: classic_conditions
        annotations:
          summary: "High Trust Runtime latency observed in traces"
          description: "Trust verification spans exceeding 4s."
