name: Deploy Autoscaler

on:
  push:
    branches:
      - main
    paths:
      - 'services/worker/runpod_api.py'
      - 'services/worker/autoscaler.py'
      - '.github/workflows/deploy-autoscaler.yml'
      - 'Dockerfile.autoscaler'
      - 'services/worker/requirements-autoscaler.txt'
  workflow_dispatch:

jobs:
  deploy-autoscaler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PW_TOKEN }}

      - name: Build and push autoscaler image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.autoscaler
          push: true
          tags: |
            simhpcworker/simhpc-autoscaler:latest
            simhpcworker/simhpc-autoscaler:v${{ github.run_number }}
