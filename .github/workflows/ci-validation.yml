name: CI Validation Gateway

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Python dependencies (HERMETIC)
        run: |
          cd backend
          $HOME/.local/bin/uv pip install --system -r requirements.txt
          $HOME/.local/bin/uv pip install --system -e .

      - name: Run Python Unified CI Gate
        run: |
          cd backend
          python ../tools/ci_gate.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps (HERMETIC)
        run: |
          cd frontend
          npm ci

      - name: Frontend validation (typecheck, manifest)
        run: |
          cd frontend
          npm run typecheck
          npm run manifest
          npm run build