name: Deploy to RunPod

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Pod action'
        required: true
        default: 'restart'
        type: choice
        options:
          - restart
          - stop
          - start

jobs:
  deploy-runpod:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: RunPod Pod Action
        run: |
          # Export token and run infisical to get secrets
          export INFISICAL_TOKEN="${{ secrets.INFISICAL_TOKEN }}"
          
          infisical secrets export --env=prod --secret-names=RUNPOD_API_KEY,RUNPOD_POD_ID --format=json > /tmp/secrets.json
          
          RUNPOD_API_KEY=$(grep -o '"RUNPOD_API_KEY": *"[^"]*"' /tmp/secrets.json | cut -d'"' -f4)
          RUNPOD_POD_ID=$(grep -o '"RUNPOD_POD_ID": *"[^"]*"' /tmp/secrets.json | cut -d'"' -f4)
          
          echo "=== Pod ID: $RUNPOD_POD_ID"
          echo "=== Action: $ACTION"
          
          ACTION="${{ github.event.inputs.action }}"
          
          if [ "$ACTION" = "restart" ]; then
            mutation="mutation { podRestart(podId: \"$RUNPOD_POD_ID\") { id status } }"
          elif [ "$ACTION" = "stop" ]; then
            mutation="mutation { podStop(podId: \"$RUNPOD_POD_ID\") { id status } }"
          elif [ "$ACTION" = "start" ]; then
            mutation="mutation { podStart(podId: \"$RUNPOD_POD_ID\") { id status } }"
          fi
          
          echo "=== Mutation: $mutation"
          
          response=$(curl -s -X POST "https://api.runpod.io/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -d "{\"query\": \"$mutation\"}")
          
          echo "=== Response: $response"
          
          if echo "$response" | grep -q '"errors"'; then
            echo "Error: GraphQL errors detected"
            echo "$response"
            exit 1
          fi
          
          echo "Pod action completed successfully"
