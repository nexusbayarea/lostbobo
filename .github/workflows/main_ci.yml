name: "v3.5.0 Deterministic Unified CI"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  # STAGE 1: VALIDATION (The "Gatekeeper")
  validate:
    name: Backend & Dependency Audit
    runs-on: ubuntu-latest
    outputs:
      status: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Hermetic Check (Drift & Lint)
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install ruff
          uv pip install -r backend/requirements.txt
          
          # 1. Deterministic Lint Check
          python3 -m ruff check backend/
          
          # 2. Dependency Drift Check
          uv pip compile backend/requirements.txt -o /tmp/check.txt
          if ! diff -u backend/requirements.txt /tmp/check.txt; then
            echo "❌ Dependency drift detected!"
            exit 1
          fi

  # STAGE 2: BUILD (Only runs if Stage 1 is Green)
  build-worker:
    name: Build & Push Worker
    needs: validate
    runs-on: ubuntu-latest
    if: needs.validate.outputs.status == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: backend/worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/simhpc-worker:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/simhpc-worker:latest
