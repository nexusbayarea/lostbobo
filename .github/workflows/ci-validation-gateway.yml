name: "v3.5.0 CI Validation Gateway"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Backend & Frontend Hermetic Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- BACKEND VALIDATION ---
      - name: Set up Python & uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Backend (HERMETIC)
        run: |
          uv venv
          source .venv/bin/activate
          # Explicitly install tools and requirements
          uv pip install ruff networkx
          uv pip install -r backend/requirements.txt
          uv pip install -e ./backend
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Run Python Unified CI Gate
        run: |
          source .venv/bin/activate
          python3 backend/tools/ci_gate.py

      # --- FRONTEND VALIDATION ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend (HERMETIC)
        run: |
          cd frontend
          npm ci

      - name: Frontend Typecheck & Build
        run: |
          cd frontend
          npm run typecheck
          npm run build

      - name: Summary
        if: always()
        run: echo "✅ Validation Gateway Complete for SHA ${{ github.sha }}"
