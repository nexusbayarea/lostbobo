name: Unified Deterministic CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

env:
  PYTHON_VERSION: "3.11"
  SB_URL: "http://localhost:8000"
  SB_TOKEN: "ci-stub-token"
  SB_SECRET_KEY: "ci-stub-secret"
  SB_JWT_SECRET: "ci-stub-jwt"
  SB_PUB_KEY: "ci-stub-pubkey"
  SB_DATA_URL: "http://localhost:8001"
  RUNTIME_MODE: "ci"

jobs:
  ci:
    name: Full CI Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ---------- STRUCTURE GUARD ----------
      - name: Assert src layout
        run: |
          test -d app || (echo "Missing app" && exit 1)
          test -d worker || (echo "Missing worker" && exit 1)

      # ---------- LINT ----------
      - name: Install lint tools
        run: pip install ruff==0.4.4

      - name: Ruff format check
        run: ruff format --check . --config pyproject.toml

      - name: Ruff lint
        run: ruff check . --config pyproject.toml

      # ---------- LOCKFILE DRIFT ----------
      - name: Verify lockfile consistency
        run: |
          uv pip compile pyproject.toml -o requirements.api.lock.tmp
          diff -q requirements.api.lock requirements.api.lock.tmp

      # ---------- INSTALL (DETERMINISTIC) ----------
      - name: Install dependencies from lockfile
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -r requirements.api.lock
          uv pip install -r requirements.dev.lock
          uv pip install -e .

      # ---------- IMPORT + BOUNDARY CHECK ----------
      - name: Verify imports
        run: |
          source .venv/bin/activate
          python -c "from app.gateway import app; from worker.worker import worker; print('imports OK')"

      - name: Enforce import boundaries
        run: |
          source .venv/bin/activate
          python tools/ci_gates/check_import_boundaries.py

      - name: Runtime Isolation Gate (HARD)
        run: |
          source .venv/bin/activate
          python tools/ci_gates/runtime_isolation.py

      # ---------- TESTS ----------
      - name: Run tests
        run: |
          source .venv/bin/activate
          python -m pytest ../tests/ -q --tb=short

      - name: Boot validation
        run: |
          source .venv/bin/activate
          pytest ../tests/test_boot.py -xvs

      - name: Boot fail-fast validation
        run: |
          source .venv/bin/activate
          pytest ../tests/test_boot_failfast.py -xvs

      - name: DAG system tests
        run: |
          source .venv/bin/activate
          pytest ../tests/test_dag.py -xvs

      # ---------- PURITY CHECKS ----------
      - name: API purity (no worker deps)
        run: |
          source .venv/bin/activate
          python -c "import numpy" && exit 1 || echo "OK"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy trigger
        run: echo "All checks passed for ${{ github.sha }}"
