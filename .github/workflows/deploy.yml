name: Deploy SimHPC Gamma

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  RUNTIME_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - kernel
          - rag-service
          - module-runtime
          - worker-service
          - gpu-worker
          - telemetry

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: services/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/simhpc-${{ matrix.service }}:${{ env.RUNTIME_VERSION }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/simhpc-${{ matrix.service }}:latest
          build-args: |
            RUNTIME_VERSION=${{ env.RUNTIME_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose -f deployment/docker-compose.yml up -d
          sleep 30
          bash deployment/scripts/health-check.sh || sleep 30

      - name: Run tests
        run: |
          pip install pytest httpx grpcio
          pytest tests/integration/ -v

      - name: Cleanup
        if: always()
        run: docker compose -f deployment/docker-compose.yml down

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - name: Deploy CPU Node
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.RUNPOD_CPU_HOST }}
          username: root
          key: ${{ secrets.RUNPOD_SSH_KEY }}
          script: |
            cd /root/simhpc-gamma
            git pull origin main
            docker compose -f deployment/docker-compose.yml pull
            docker compose -f deployment/docker-compose.yml up -d --remove-orphans
            bash deployment/scripts/health-check.sh

      - name: Deploy GPU Node
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.RUNPOD_GPU_HOST }}
          username: root
          key: ${{ secrets.RUNPOD_SSH_KEY }}
          script: |
            cd /root/simhpc-gamma
            git pull origin main
            docker compose -f deployment/docker-compose.gpu.yml pull
            docker compose -f deployment/docker-compose.gpu.yml up -d --remove-orphans
            bash deployment/scripts/health-check.sh
