name: "v2.5.0 Production Deployment"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install ruff

      - run: ruff check services/worker/worker.py services/api/api.py

      - run: ruff format --check services/worker/worker.py services/api/api.py
