version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: simhpc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    build:
      context: ..
      dockerfile: services/ollama/Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/simhpc-ollama:latest
    container_name: simhpc-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  rag-service:
    build:
      context: ..
      dockerfile: services/rag-service/Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/simhpc-rag-service:latest
    container_name: simhpc-rag
    restart: unless-stopped
    ports:
      - "50051:50051"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - EMBEDDING_MODEL=nomic-embed-text:v2-moe
      - VECTOR_DIM=768
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

  gateway-service:
    build:
      context: ..
      dockerfile: services/gateway-service/Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/simhpc-gateway:latest
    container_name: simhpc-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - RAG_SERVICE_HOST=rag-service
      - RAG_SERVICE_PORT=50051
      - MODULE_RUNTIME_HOST=module-runtime
      - MODULE_RUNTIME_PORT=50052
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - ENVIRONMENT=production
    depends_on:
      rag-service:
        condition: service_started
      redis:
        condition: service_healthy

  module-runtime:
    build:
      context: ..
      dockerfile: services/module-runtime/Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/simhpc-module-runtime:latest
    container_name: simhpc-modules
    restart: unless-stopped
    ports:
      - "50052:50052"
    volumes:
      - ../plugins:/app/plugins:ro
    environment:
      - GATEWAY_HOST=gateway-service
      - GATEWAY_PORT=50054
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    depends_on:
      - gateway-service

  worker-service:
    build:
      context: ..
      dockerfile: services/worker-service/Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/simhpc-worker:latest
    container_name: simhpc-workers
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - RAG_SERVICE_HOST=rag-service
      - RAG_SERVICE_PORT=50051
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      rag-service:
        condition: service_started

volumes:
  redis_data:
  ollama_data:

networks:
  default:
    name: simhpc-net
