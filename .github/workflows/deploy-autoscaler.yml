name: Deploy Autoscaler

on:
  push:
    branches:
      - main
    paths:
      - 'services/worker/runpod_api.py'
      - 'services/worker/autoscaler.py'
      - '.github/workflows/deploy-autoscaler.yml'
      - 'Dockerfile.autoscaler'
      - 'services/worker/requirements-autoscaler.txt'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-autoscaler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push autoscaler image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.autoscaler
          push: true
          tags: |
            simhpcworker/simhpc-autoscaler:latest
            simhpcworker/simhpc-autoscaler:v2.5.0
