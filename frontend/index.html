    <!-- 3. FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is SimHPC?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SimHPC is a distributed compute operating system for engineering simulation. It provides a deterministic kernel scheduler, immutable GPU execution containers (MFEM + SUNDIALS), and a zero-trust plugin fabric (Clawpassport) that verifies every plugin, agent, and simulation result."
          }
        },
        {
          "@type": "Question",
          "name": "What makes SimHPC different from cloud simulation tools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SimHPC is not a SaaS wrapper around a solver. It is a full execution kernel with a deterministic scheduler, portable DAG intermediate representation, world state fabric, and built-in trust verification. Every simulation is replayable, and every inter-plugin communication is authenticated via the A2A handshake protocol."
          }
        },
        {
          "@type": "Question",
          "name": "What is Clawpassport?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Clawpassport is an open-source trust protocol for AI agent and plugin ecosystems. It combines cryptographic identity verification with runtime behavioural telemetry to produce dynamic trust scores. Plugins that behave anomalously have their trust decayed automatically, even if their cryptographic credentials are valid."
          }
        },
        {
          "@type": "Question",
          "name": "How are simulations kept deterministic and replayable?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SimHPC pins every dependency (GPU driver, CUDA version, solver version, random seed) into immutable Docker images. Every execution is hashed into a replay manifest that includes the environment fingerprint, DAG hash, world snapshot hash, and seed. Replay reconstructs identical results."
          }
        },
        {
          "@type": "Question",
          "name": "Can external developers build plugins?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Plugin SDK provides a frozen ABI, capability registry, and sandboxed execution environment. Plugins carry a signed Clawpassport, declare capabilities, and communicate solely through the kernel-mediated A2A protocol. No plugin can access the kernel directly."
          }
        },
        {
          "@type": "Question",
          "name": "What GPU infrastructure does SimHPC use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SimHPC runs on NVIDIA A40 GPUs via RunPod, using immutable Docker images with compiled MFEM and SUNDIALS libraries. The kernel scheduler manages GPU allocation with fairness, budget enforcement, and preemption."
          }
        }
      ]
    }
    </script>
