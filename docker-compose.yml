version: '3.8'

services:
  # Frontend static files served by nginx
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  # The SimHPC Unified Platform (API + AI + Worker)
  api:
    build:
      context: ./services/robustness-orchestrator
      dockerfile: Dockerfile
    image: simhpc/api:alpha
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
      - SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET_FILE=/run/secrets/supabase_jwt_secret
      - MERCURY_API_KEY=${MERCURY_API_KEY}
      - MERCURY_MODEL=${MERCURY_MODEL:-mercury-2}
      - SIMHPC_API_KEY=${SIMHPC_API_KEY}
      - STRIPE_SECRET_KEY_FILE=/run/secrets/stripe_secret_key
    secrets:
      - redis_password
      - supabase_jwt_secret
      - stripe_secret_key
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # GPU-enabled Physics Worker (Celery/Distributed)
  worker:
    image: simhpc/api:alpha
    env_file: .env
    environment:
      - SERVICE_TYPE=worker
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
    secrets:
      - redis_password
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      replicas: 1
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          cpus: '8'
          memory: 32G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "nvidia-smi --query-gpu=name --format=csv,noheader || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 180s
    volumes:
      - simulation_scratch:/tmp/sim_scratch
    networks:
      - backend

  # High-speed Message Broker & State Store
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    secrets:
      - redis_password

networks:
  backend:
    driver: bridge

volumes:
  simulation_scratch:

secrets:
  redis_password:
    file: ./secrets/redis_password.txt
  supabase_jwt_secret:
    file: ./secrets/supabase_jwt_secret.txt
  stripe_secret_key:
    file: ./secrets/stripe_secret_key.txt
