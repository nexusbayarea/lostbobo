name: Deploy SimHPC Worker to RunPod

on:
  push:
    branches: [ "main" ]
    paths:
      - 'services/runpod-worker/**'
      - 'services/robustness-orchestrator/robustness_service.py'
      - 'Dockerfile.autoscaler'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/runpod-worker/Dockerfile.serverless
          push: true
          tags: |
            simhpcworker/simhpc-worker:v1.6.0
            simhpcworker/simhpc-worker:latest

      - name: Wait for RunPod Pull
        run: sleep 60

      - name: RunPod Health Check Ping
        run: |
          curl -X POST "https://api.runpod.ai/v2/dfnc77nf8oo3ne/runsync" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            -d '{"input": {"check_health_only": true}}'
