name: Unified Kernel CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  kernel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff

      - name: Run Mutation Kernel (Mutation Phase)
        run: python -m runtime.kernel

      - name: Run Strict Validation (Read-Only Phase)
        run: |
          ruff format --check .
          ruff check .
