name: Unified Deterministic CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Debug CI filesystem
        run: |
          echo "PWD: $(pwd)"
          echo "Root directories:"
          ls -R
        working-directory: .

      - name: Run Unified CI
        run: python ../tools/run_ci.py
        working-directory: backend