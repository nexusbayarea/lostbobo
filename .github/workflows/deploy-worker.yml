name: Deploy SimHPC Worker to RunPod

on:
  push:
    branches: [ "main" ]
    paths:
      - 'services/runpod-worker/**'
      - 'services/robustness-orchestrator/robustness_service.py'
      - '../../Dockerfile.pod'
      - '../../services/robustness-orchestrator/worker.py'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Pod Image
        uses: docker/build-push-action@v5
        with:
          context: ../..
          file: ../../Dockerfile.pod
          push: true
          tags: |
            simhpcworker/simhpc-worker:v2.0.0
            simhpcworker/simhpc-worker:latest
