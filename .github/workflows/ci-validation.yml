name: CI Validation (v3.4.0)

on:
  push:
    branches: [main]
  pull_request:

env:
  SERVICE_ROLE: api

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python + uv (cached)
        uses: ./.github/actions/setup-python-env

      - name: Detect Changes
        id: changes
        run: |
          CHANGED=$(python scripts/detect_changes.py ${{ github.base_commit }} ${{ github.sha }})
          echo "Changed modules: $CHANGED"
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Linting (Ruff) - Deterministic
        run: |
          /home/runner/.local/bin/uvx ruff check . --fix
          /home/runner/.local/bin/uvx ruff check .

      - name: Testing (Pytest)
        if: contains(steps.changes.outputs.changed, 'tests') || contains(steps.changes.outputs.changed, 'app') || contains(steps.changes.outputs.changed, 'dependency')
        env:
          SB_URL: http://test-backbone
          SB_DATA_URL: http://test-data
          SB_JWT_SECRET: test-secret
          SB_PUB_KEY: test-pub
          SB_SECRET_KEY: test-key
          SB_TOKEN: test-token
        run: |
          /home/runner/.local/bin/uv run pytest

      - name: API Structural Check
        if: contains(steps.changes.outputs.changed, 'api') || contains(steps.changes.outputs.changed, 'app') || contains(steps.changes.outputs.changed, 'dependency')
        env:
          SB_URL: http://test-backbone
          SB_DATA_URL: http://test-data
          SB_JWT_SECRET: test-secret
          SB_PUB_KEY: test-pub
          SB_SECRET_KEY: test-key
          SB_TOKEN: test-token
        run: |
          /home/runner/.local/bin/uv run python -c "from app.api.main import app; print('API imports OK')"

      - name: Structure Check
        if: contains(steps.changes.outputs.changed, 'docker') || contains(steps.changes.outputs.changed, 'ci')
        run: |
          test -f ./docker/images/Dockerfile.unified
          echo "Repository structure valid"

      - name: Report git SHA
        run: |
          echo "GIT_SHA=${{ github.sha }}" >> $GITHUB_OUTPUT