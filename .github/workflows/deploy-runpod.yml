name: Deploy to RunPod

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Pod action'
        required: true
        default: 'restart'
        type: choice
        options:
          - restart
          - stop
          - start

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-runpod:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: simhpc
          env-slug: prod
          domain: https://app.infisical.com
          secrets: |
            RUNPOD_API_KEY
            RUNPOD_POD_ID

      - name: RunPod Pod Action
        run: |
          echo "=== Pod ID: $RUNPOD_POD_ID"
          echo "=== Action: $ACTION"
          
          ACTION="${{ github.event.inputs.action }}"
          
          if [ "$ACTION" = "restart" ]; then
            mutation="mutation { podRestart(podId: \"$RUNPOD_POD_ID\") { id status } }"
          elif [ "$ACTION" = "stop" ]; then
            mutation="mutation { podStop(podId: \"$RUNPOD_POD_ID\") { id status } }"
          elif [ "$ACTION" = "start" ]; then
            mutation="mutation { podStart(podId: \"$RUNPOD_POD_ID\") { id status } }"
          fi
          
          echo "=== Mutation: $mutation"
          
          response=$(curl -s -X POST "https://api.runpod.io/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -d "{\"query\": \"$mutation\"}")
          
          echo "=== Response: $response"
          
          if echo "$response" | grep -q '"errors"'; then
            echo "Error: GraphQL errors detected"
            echo "$response"
            exit 1
          fi
          
          echo "Pod action completed successfully"
