name: uv-setup

on:
  workflow_call:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv

      - name: Create venv
        run: uv venv

      - name: CI sanity check
        run: |
          uv --version
          python --version
          echo "CI OK"