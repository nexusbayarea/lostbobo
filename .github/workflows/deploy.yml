name: SimHPC Alpha Deployment
on:
  push:
    branches: [ main ]
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ruff
        run: pip install ruff
      - name: Lint Check
        run: ruff check backend/worker/worker.py backend/app/api/api_router.py