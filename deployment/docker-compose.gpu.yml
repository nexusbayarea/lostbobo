version: "3.9"

services:
  gpu-worker:
    build:
      context: ..
      dockerfile: services/gpu-worker/Dockerfile
    image: simhpc/gpu-worker:${RUNTIME_VERSION:-latest}
    container_name: simhpc-gpu-worker
    restart: unless-stopped
    ports:
      - "50053:50053"
    environment:
      - KERNEL_HOST=${KERNEL_HOST:-kernel}
      - KERNEL_PORT=50054
      - REDIS_URL=redis://${REDIS_HOST:-redis}:6379
      - RUNTIME_VERSION=${RUNTIME_VERSION:-latest}
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - OMP_NUM_THREADS=8
      - MKL_NUM_THREADS=8
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - simulation_data:/data
      - /opt/sundials:/opt/sundials:ro
      - /opt/mfem:/opt/mfem:ro
      - /opt/glvis:/opt/glvis:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch = grpc.insecure_channel('localhost:50053'); grpc.channel_ready_future(ch).result(timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - simhpc-simulation
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  simulation_data:
    driver: local

networks:
  simhpc-simulation:
    driver: bridge
    internal: true
