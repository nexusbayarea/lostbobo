name: Deploy Autoscaler

on:
  push:
    branches:
      - main
    paths:
      - 'services/worker/runpod_api.py'
      - 'services/worker/autoscaler.py'
      - '.github/workflows/deploy-autoscaler.yml'
      - 'Dockerfile.autoscaler'
      - 'services/worker/requirements-autoscaler.txt'
  workflow_dispatch:

jobs:
  deploy-autoscaler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1
        with:
          infisical_url: https://app.infisical.com
          client_id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client_secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project_id: simhpc
          env: prod
          secrets: |
            DOCKER_ACCESS_TOKEN
            DOCKER_USERNAME

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push autoscaler image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.autoscaler
          push: true
          tags: |
            simhpcworker/simhpc-autoscaler:latest
            simhpcworker/simhpc-autoscaler:v2.5.3
