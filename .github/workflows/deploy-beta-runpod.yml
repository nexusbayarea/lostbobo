name: BETA Deployment (Secret-Ops)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Initialize Infisical
        run: |
          echo "initializing infisical"
          infisical init --projectId=f8464ba0-1b93-45a1-86b5-c8ea5a81a2a4 --plaintext-output || true

      - name: Docker Login & Build
        run: |
          infisical run --projectId=f8464ba0-1b93-45a1-86b5-c8ea5a81a2a4 --env=beta -- bash -c '
            echo "$DOCKER_ACCESS_TOKEN" | docker login -u "$DOCKER_USERNAME" --password-stdin
            docker build -t simhpcworker/simhpc-worker:latest -f Dockerfile.worker .
            docker push simhpcworker/simhpc-worker:latest
          '

      - name: Deploy to RunPod via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RUNPOD_SSH_HOST }}
          username: ${{ secrets.RUNPOD_SSH_USER }}
          key: ${{ secrets.RUNPOD_SSH_KEY }}
          port: ${{ secrets.RUNPOD_SSH_PORT }}
          script: |
            docker pull simhpcworker/simhpc-worker:latest
            docker stop simhpc-worker || true
            docker rm simhpc-worker || true
            docker run -d --name simhpc-worker \
              --gpus all \
              simhpcworker/simhpc-worker:latest
            echo "Container restarted with latest image"
