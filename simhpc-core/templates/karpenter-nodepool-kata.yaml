# Karpenter NodePool for Kata Containers
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: kata-plugins
spec:
  template:
    spec:
      nodeClassRef:
        name: kata-nodeclass
      requirements:
        - key: katacontainers.io/kata
          operator: In
          values: ["true"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
  limits:
    cpu: 64
    memory: 256Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    expireAfter: 720h