apiVersion: chaos-mesh.org/v1alpha1
kind: Workflow
metadata:
  name: rag-full-suite
spec:
  entry: rag-validation
  templates:
    - name: rag-validation
      templateType: NetworkChaos
      templateSpec:
        action: delay
        mode: one
        selector:
          labelSelectors:
            app: simhpc-rag
        delay:
          latency: "200ms"
          jitter: "50ms"
        duration: "30s"
