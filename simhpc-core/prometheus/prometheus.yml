global:
  scrape_interval: 15s
  evaluation_interval: 15s

federate:
  scrape_configs:
    - job_name: 'federate'
      honor_labels: true
      metrics_path: '/federate'
      params:
        'match[]':
          - '{job="simhpc-core"}'
          - '{job="nvidia-dcgm-exporter"}'
      static_configs:
        - targets: ['localhost:9090']

scrape_configs:
  - job_name: 'simhpc-core'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: simhpc-core
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        action: keep
        regex: 8000

  - job_name: 'nvidia-dcgm'
    static_configs:
      - targets: ['nvidia-dcgm-exporter.monitoring.svc.cluster.local:9400']

rule_files:
  - /etc/prometheus/recording-rules.yaml
  - /etc/prometheus/alert-rules.yaml
