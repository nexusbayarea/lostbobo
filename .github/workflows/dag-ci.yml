name: Unified CI Gate (Strict)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio

      - name: Ruff Lint (STRICT)
        run: python -m ruff check . --exit-non-zero-on-fix

      - name: Ruff Format Check (STRICT)
        run: python -m ruff format . --check

      - name: System Bootstrap Contract (HARD GATE)
        run: python tools/bootstrap.py ci

      - name: Pytest (STRICT)
        run: pytest -q --disable-warnings --maxfail=1 --strict-markers --strict-config

      - name: Docker Build (optional)
        run: |
          docker build -f docker/images/Dockerfile.unified .