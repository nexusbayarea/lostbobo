name: Deterministic API CI (Container Native)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/simhpc-base

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      sha: ${{ github.sha }}

    steps:
      - name: Normalize image name
        id: image
        run: |
          IMAGE=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Report git SHA
        run: |
          echo "GIT_SHA=${{ github.sha }}" >> $GITHUB_OUTPUT

  lint:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4

      - name: Pull dependency image
        run: docker pull ${{ needs.prepare.outputs.image }}:latest

      - name: Run lint
        run: |
          docker run --rm \
            -v $PWD:/app \
            -w /app \
            ${{ needs.prepare.outputs.image }}:latest \
            sh -c "ruff check . --fix && ruff check ."

  tests:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4

      - name: Pull dependency image
        run: docker pull ${{ needs.prepare.outputs.image }}:latest

      - name: Run tests
        run: |
          docker run --rm \
            -v $PWD:/app \
            -w /app \
            -e SB_URL=http://test \
            -e SB_DATA_URL=http://test \
            -e SB_JWT_SECRET=test \
            -e SB_PUB_KEY=test \
            -e SB_SECRET_KEY=test \
            -e SB_TOKEN=test \
            ${{ needs.prepare.outputs.image }}:latest \
            pytest

  api-struct:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4

      - name: Pull dependency image
        run: docker pull ${{ needs.prepare.outputs.image }}:latest

      - name: Run API structure check
        run: |
          docker run --rm \
            -v $PWD:/app \
            -w /app \
            -e SB_URL=http://test \
            -e SB_DATA_URL=http://test \
            -e SB_JWT_SECRET=test \
            -e SB_PUB_KEY=test \
            -e SB_SECRET_KEY=test \
            -e SB_TOKEN=test \
            ${{ needs.prepare.outputs.image }}:latest \
            sh -c "python -c 'from app.api.main import app; print(\"OK\")'"

  structure:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Structure check
        run: |
          test -f ./docker/images/Dockerfile.unified
          echo "Repository structure valid"