name: CI Validation Gateway

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv pip install --system ruff
          uv pip install --system -r requirements.api.lock

      - name: Ruff lint
        run: python -m ruff check . --config pyproject.toml

      - name: Ruff format check
        run: python -m ruff format . --check --config pyproject.toml

      - name: Bootstrap contract
        run: |
          export PYTHONPATH=$GITHUB_WORKSPACE
          python -m tools.bootstrap ci