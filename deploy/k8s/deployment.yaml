apiVersion: apps/v1
kind: Deployment
metadata:
  name: simhpc-backend
  labels:
    app: simhpc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simhpc
  template:
    metadata:
      labels:
        app: simhpc
    spec:
      containers:
      - name: backend
        image: simhpc/backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: RUNTIME_MODE
          value: "production"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: simhpc-backend
spec:
  type: ClusterIP
  selector:
    app: simhpc
  ports:
  - port: 8000
    targetPort: 8000
