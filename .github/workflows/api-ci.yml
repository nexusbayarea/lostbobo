name: API CI

on:
  workflow_run:
    workflows: ["Lint", "Tests"]
    types:
      - completed

jobs:
  api-ci:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.name == 'Tests'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: |
          uv venv
          uv pip install -e .[dev]

      - name: Run API checks
        run: |
          echo "Run your API validation here"