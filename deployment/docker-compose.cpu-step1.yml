version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: simhpc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - simhpc-control

  ollama:
    image: ollama/ollama:latest
    container_name: simhpc-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - simhpc-reasoning

  gateway:
    build:
      context: ../services/kernel
      dockerfile: Dockerfile
    container_name: simhpc-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - OLLAMA_HOST=http://ollama:11434
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - ENVIRONMENT=development
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - simhpc-control
      - simhpc-reasoning

volumes:
  redis_data:
  ollama_data:

networks:
  simhpc-control:
    driver: bridge
  simhpc-reasoning:
    driver: bridge
    internal: true
