version: '3.9'

# ═══════════════════════════════════════════════════════════
# SimHPC v2.7 Docker Compose
# Structure: /docker/images/Dockerfile.unified
# No Redis - Supabase is source of truth
# ═══════════════════════════════════════════════════════════

services:
  # ───────────────────────────────────────────────────────────
  # SimHPC Unified Service (API + Worker + Autoscaler)
  # ───────────────────────────────────────────────────────────
  api:
    build:
      context: ../../
      dockerfile: docker/images/Dockerfile.unified
    image: simhpc-unified:latest
    container_name: simhpc-api
    ports:
      - "8080:8080"
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - SUPABASE_AUDIENCE=${SUPABASE_AUDIENCE:-authenticated}
      - SIMHPC_API_KEY=${SIMHPC_API_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PORT=8080
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - HF_HOME=/workspace/huggingface
      - VLLM_CACHE=/workspace/vllm_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    resources:
      limits:
        cpus: '2'
        memory: 4G
      reservations:
        cpus: '1'
        memory: 2G
    restart: unless-stopped
    networks:
      - simhpc-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    security_opt:
      - no-new-privileges:true

  # ───────────────────────────────────────────────────────────
  # (Optional) Prometheus - Metrics collection
  # ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: simhpc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - simhpc-net
    restart: unless-stopped

  # ───────────────────────────────────────────────────────────
  # (Optional) Grafana - Monitoring dashboard
  # ───────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: simhpc-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - simhpc-net
    restart: unless-stopped

networks:
  simhpc-net:
    driver: bridge

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ═══════════════════════════════════════════════════════════
# Usage:
#
# Start:
#   cd docker/compose && docker-compose up -d
#
# View logs:
#   docker-compose logs -f api
#
# Stop:
#   docker-compose down
#
# Environment variables (.env):
#   SUPABASE_URL=https://xxx.supabase.co
#   SUPABASE_JWT_SECRET=your-jwt-secret
#   SIMHPC_API_KEY=your-api-key
#   ENVIRONMENT=production
#
# ═══════════════════════════════════════════════════════════