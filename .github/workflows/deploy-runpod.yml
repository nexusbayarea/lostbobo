name: Deploy to RunPod

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Pod action'
        required: true
        default: 'restart'
        type: choice
        options:
          - restart
          - stop
          - start

jobs:
  deploy-runpod:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Python and pip
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip

      - name: Install RunPod CLI
        run: pip3 install runpod

      - name: RunPod Pod Action
        run: |
          python3 -c "
import os
import runpod

runpod.api_key = os.getenv('RUNPOD_API_KEY')
pod_id = '1kpv9yhwcoj1oo'
action = os.getenv('ACTION', 'restart')

print(f'=== Pod ID: {pod_id}')
print(f'=== Action: {action}')

if action == 'restart':
    print(f'Restarting pod {pod_id}...')
    result = runpod.restart_pod(pod_id)
elif action == 'stop':
    print(f'Stopping pod {pod_id}...')
    result = runpod.stop_pod(pod_id)
elif action == 'start':
    print(f'Starting pod {pod_id}...')
    result = runpod.resume_pod(pod_id)

print(f'=== Result: {result}')
print('Pod action completed successfully')
"
        env:
          RUNPOD_API_KEY: ${{ secrets.INFISICAL_TOKEN }}
          ACTION: ${{ github.event.inputs.action }}
