# Production values for SimHPC Core Engine
replicaCount: 3

image:
  repository: your-registry/simhpc-core
  pullPolicy: Always
  tag: "2026.05.10"

service:
  type: ClusterIP
  port: 8000

# GPU Scheduling (Production settings)
gpu:
  enabled: true
  count: 1.0
  fractional:
    enabled: true
    max_shared_per_gpu: 8
  mps:
    enabled: true
    activeThreadPercentage: 92
  mig:
    enabled: false
  nodeSelector:
    nvidia.com/gpu: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  resources:
    requests:
      nvidia.com/gpu: "1"
      cpu: "4"
      memory: "16Gi"
    limits:
      nvidia.com/gpu: "1"
      cpu: "8"
      memory: "32Gi"

ingress:
  enabled: true
  className: nginx
  host: simhpc.yourcompany.com
  tls:
    enabled: true
    secretName: simhpc-tls

supabase:
  url: "https://your-project-ref.supabase.co"
  key: ""

infisical:
  token: ""
  projectId: "your-project-id"
  environment: "production"

env:
  INFISICAL_TOKEN: ""
  INFISICAL_PROJECT_ID: ""
  SUPABASE_URL: ""
  SUPABASE_SERVICE_KEY: ""
  EVENT_BUS_MAX_QUEUE_DEPTH: "5000"

resources:
  requests:
    cpu: "4"
    memory: "16Gi"
  limits:
    cpu: "12"
    memory: "48Gi"

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 2

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Karpenter Integration
karpenter:
  enabled: true
  nodePools:
    - name: gpu-general
      instanceFamily: ["g4dn", "g5", "p3", "p4d", "p5", "g6"]
      capacityType: ["spot", "on-demand"]
      minSize: 3
      maxSize: 40
      spotPriority: true
    - name: gpu-high-mem
      instanceFamily: ["p4d", "p5"]
      capacityType: ["on-demand"]
      minSize: 1
      maxSize: 12
    - name: gpu-isolated
      instanceFamily: ["p4d", "p5"]
      capacityType: ["on-demand"]
      minSize: 2
      maxSize: 8

# Monitoring
monitoring:
  gpu:
    enabled: true

# Cost Optimization
costOptimization:
  spotPriority: true
  spotThreshold: 0.4
  minSpotSavings: 0.6

# MIG (Multi-Instance GPU) Configuration
mig:
  enabled: true
  defaultProfile: "mixed"
  controller:
    enabled: true
    schedule: "*/5 * * * *"
  monitoring:
    enabled: true

# Prometheus Federation
prometheus:
  federation:
    enabled: true
    match:
      - '{job="simhpc-core"}'
      - '{job="nvidia-dcgm-exporter"}'
    central_prometheus_url: "https://central-prometheus.yourdomain.com"

# Thanos Configuration (Long-term metrics store)
thanos:
  enabled: false
  objstore:
    type: s3
    bucket: "simhpc-thanos"
    endpoint: "s3.us-east-1.amazonaws.com"
    region: "us-east-1"
    access_key: ""
    secret_key: ""
  sidecar:
    enabled: false
    prometheusUrl: "http://prometheus-operated.monitoring.svc.cluster.local:9090"
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
  querier:
    enabled: false
    replicas: 3
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
  storeGateway:
    enabled: false
    replicas: 2
  compactor:
    enabled: false
    replicas: 1
    retention:
      raw: 90d
      5m: 1y
      1h: 2y
  ruler:
    enabled: false
    replicas: 2
  queryFrontend:
    enabled: false
    replicas: 2

# Cortex Long-Term Storage
cortex:
  enabled: false
  tenant: "simhpc"
  distributor:
    replicas: 2
  ingester:
    replicas: 3
    persistence:
      enabled: true
      size: 50Gi
  storeGateway:
    replicas: 2
  compactor:
    replicas: 1
    persistence:
      enabled: true
      size: 100Gi
  querier:
    replicas: 3
  queryFrontend:
    replicas: 2
  storage:
    backend: s3
    s3:
      bucket: "simhpc-cortex"
      endpoint: "s3.us-east-1.amazonaws.com"
      region: "us-east-1"
      accessKey: ""
      secretKey: ""
  retention:
    default: 90d
    metrics:
      "DCGM_FI_DEV_GPU_UTIL": 45d
      "DCGM_FI_DEV_MEM_COPY_UTIL": 45d
      "mig:utilization:avg": 45d
      "simhpc_fractional_gpu_utilization": 60d
      "mps_active_clients": 60d
      "lineage:events:rate5m": 30d
      "sla:compliance:overall": 365d
      "sla:breach:rate:1h": 365d
      "kernel:executions:success_rate:5m": 180d
