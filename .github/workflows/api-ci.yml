name: API CI

on:
  workflow_run:
    workflows: ["Lint", "Tests"]
    types:
      - completed

jobs:
  api-ci:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.name == 'Tests'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e .[dev]

      - name: Run API validation
        run: |
          source .venv/bin/activate
          python -c "import sys; sys.path.append('app'); from app.api.main import app; print('API imports successfully')"
          echo "API validation completed successfully"