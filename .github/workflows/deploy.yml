name: Deploy SimHPC

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PW_TOKEN }}

      - name: Build & Push Unified Image
        run: |
          docker build -f Dockerfile.unified -t simhpcworker/simhpc-unified:latest .
          docker push simhpcworker/simhpc-unified:latest

      - name: Restart RunPod Pod (Stop + Resume)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ID: ${{ secrets.RUNPOD_ID }}
        run: |
          echo "Stopping pod: $RUNPOD_ID"
          
          STOP_RESPONSE=$(curl -s -X POST "https://api.runpod.io/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -d "{\"query\": \"mutation { podStop(input: { podId: \\\"$RUNPOD_ID\\\" }) { id desiredStatus } }\"}")
          
          echo "Stop response: $STOP_RESPONSE"
          sleep 5

          echo "Resuming pod: $RUNPOD_ID"
          
          RESUME_RESPONSE=$(curl -s -X POST "https://api.runpod.io/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -d "{\"query\": \"mutation { podResume(input: { podId: \\\"$RUNPOD_ID\\\", gpuCount: 1 }) { id desiredStatus } }\"}")
          
          echo "Resume response: $RESUME_RESPONSE"

          if echo "$RESUME_RESPONSE" | jq -e '.errors' > /dev/null 2>&1; then
            echo "API Error detected"
            echo "$RESUME_RESPONSE"
            exit 1
          fi

          echo "Pod restart completed"

      - name: Wait for pod to be RUNNING
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ID: ${{ secrets.RUNPOD_ID }}
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s -X POST "https://api.runpod.io/graphql" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -d "{\"query\": \"query { pod(input: { podId: \\\"$RUNPOD_ID\\\" }) { id desiredStatus } }\"}" | jq -r '.data.pod.desiredStatus // "UNKNOWN"')
            
            echo "Attempt $i: Status = $STATUS"
            
            if [ "$STATUS" = "RUNNING" ]; then
              echo "Pod is now RUNNING"
              exit 0
            fi
            sleep 10
          done
          echo "Pod did not reach RUNNING state in time"
          exit 1