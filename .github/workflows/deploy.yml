name: Deploy to Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - 'services/worker/**'
      - '.github/workflows/deploy.yml'
      - 'Dockerfile.*'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  deploy-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PW_TOKEN }}

      - name: Build and push unified image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.unified
          push: true
          tags: |
            simhpcworker/simhpc-unified:latest
            simhpcworker/simhpc-unified:v${{ github.run_number }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            simhpcworker/simhpc-worker:latest
            simhpcworker/simhpc-worker:v${{ github.run_number }}

      - name: Build and push autoscaler image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.autoscaler
          push: true
          tags: |
            simhpcworker/simhpc-autoscaler:latest
            simhpcworker/simhpc-autoscaler:v${{ github.run_number }}

      - name: Deploy to RunPod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: python scripts/deploy_unified.py