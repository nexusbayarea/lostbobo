name: CI Validation Gateway

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Secrets from Infisical
        uses: Infisical/secrets-action@v1.0.12
        env:
          INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${{ secrets.GIT_RUNPOD_CLIENT_ID }}
          INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${{ secrets.GIT_RUNPOD_CLIENT_SECRET }}
        with:
          method: universal
          project-slug: simhpc
          env-slug: prod

      - name: Auth with GHCR
        run: |
          echo "$GIT_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Python dependencies (HERMETIC)
        run: |
          cd backend
          $HOME/.local/bin/uv pip install --system -r requirements.txt
          $HOME/.local/bin/uv pip install --system -e .

      - name: Run Python Unified CI Gate
        run: |
          cd backend
          python tools/ci_gate.py

      - name: Build and Push Docker Image
        run: |
          docker build -f Dockerfile.unified -t ghcr.io/lostbobo/simhpc_unified:latest .
          docker push ghcr.io/lostbobo/simhpc_unified:latest

      - name: Update RunPod Template
        run: |
          cd backend
          python tools/update_runpod.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps (HERMETIC)
        run: |
          cd frontend
          npm ci

      - name: Frontend validation (typecheck, manifest)
        run: |
          cd frontend
          npm run typecheck
          npm run manifest
          npm run build