name: CI Kernel

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  kernel:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set safe image name
        id: image
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/$REPO/simhpc-base" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base image
        run: |
          docker pull ${{ steps.image.outputs.image }}:stable || echo "Image not yet built"

      - name: Run CI Kernel
        run: |
          docker run --rm \
            -v $PWD:/app \
            -w /app \
            -e SB_URL=http://test \
            -e SB_DATA_URL=http://test \
            -e SB_JWT_SECRET=test \
            -e SB_PUB_KEY=test \
            -e SB_SECRET_KEY=test \
            -e SB_TOKEN=test \
            ${{ steps.image.outputs.image }}:stable \
            python ci/kernel.py || docker run --rm \
            -v $PWD:/app \
            -w /app \
            -e SB_URL=http://test \
            -e SB_DATA_URL=http://test \
            -e SB_JWT_SECRET=test \
            -e SB_PUB_KEY=test \
            -e SB_SECRET_KEY=test \
            -e SB_TOKEN=test \
            ${{ steps.image.outputs.image }}:latest \
            python ci/kernel.py