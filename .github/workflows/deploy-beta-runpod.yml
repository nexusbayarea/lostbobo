name: Deploy Beta to RunPod

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Infisical CLI
        run: |
          sudo apt-get update && sudo apt-get install -y bash curl
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Load Secrets from Infisical
        shell: bash
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_MACHINE_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.MAC_ID_SEC }}
        run: |
          # Explicitly provide the project-slug to avoid the need for 'infisical init'
          # Replace 'simhpc-idps' with your actual Infisical project slug if it's different
          infisical export --project="simhpc-idps" --env="beta" --format=dotenv | while read -r line; do
            echo "$line" >> "$GITHUB_ENV"
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_ACCESS_TOKEN }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            simhpcworker/simhpc-worker:latest
            simhpcworker/simhpc-worker:v2.5.3

      - name: Deploy to RunPod via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.RUNPOD_SSH_HOST }}
          username: ${{ env.RUNPOD_SSH_USER }}
          key: ${{ env.RUNPOD_SSH_KEY }}
          port: ${{ env.RUNPOD_SSH_PORT }}
          script: |
            docker pull simhpcworker/simhpc-worker:latest
            docker stop simhpc-worker || true
            docker rm simhpc-worker || true
            docker run -d --name simhpc-worker \
              --gpus all \
              simhpcworker/simhpc-worker:latest
            echo "Container restarted with latest image"
