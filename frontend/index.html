    <!-- 3. FAQPage schema (AEO — answers questions directly in search/AI results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is SimHPC?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SimHPC is a robustness analysis platform for engineering R&D teams. It runs GPU-accelerated parameter sweeps and sensitivity analysis on structural and thermal finite element simulations, using MFEM and SUNDIALS solvers, and generates AI-powered interpretation reports via Mercury AI."
          }
        },
        {
          "@type": "Question",
          "name": "What simulation solvers does SimHPC use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SimHPC uses MFEM for high-order finite element discretization and SUNDIALS (specifically CVODE and ARKODE) for adaptive time integration. These are deterministic physics solvers; AI is used only for interpreting results, never for the physics."
          }
        },
        {
          "@type": "Question",
          "name": "What is robustness analysis in SimHPC?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Robustness analysis in SimHPC runs multiple simulation variations using parameter perturbation methods including ±5%, ±10%, Latin Hypercube Sampling, Monte Carlo, and Sobol global sensitivity analysis (GSA). It computes confidence intervals, variance, and ranks parameters by their influence on simulation outputs."
          }
        },
        {
          "@type": "Question",
          "name": "How does SimHPC generate engineering reports?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SimHPC uses Mercury AI (by Inception Labs) to generate structured engineering interpretation reports from simulation output data. Reports include simulation summaries, key output metrics, sensitivity rankings, uncertainty assessments, and suggested next steps. All AI output is cross-checked against deterministic solver results for numerical consistency."
          }
        },
        {
          "@type": "Question",
          "name": "What GPU infrastructure does SimHPC run on?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SimHPC runs on RunPod GPU pods (NVIDIA A40 and RTX 3090) with an autoscaler that spins pods up when jobs are queued and terminates them after idle timeout to minimize cost."
          }
        },
        {
          "@type": "Question",
          "name": "Is SimHPC suitable for enterprise R&D teams?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. SimHPC's Enterprise tier offers unlimited simulation runs, Sobol global sensitivity analysis, API access, and unlimited mesh nodes. It is designed for R&D teams that need repeatable, auditable simulation workflows with structured metadata and reproducibility controls."
          }
        }
      ]
    }
    </script>
