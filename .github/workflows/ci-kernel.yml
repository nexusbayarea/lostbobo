name: CI Kernel

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  kernel:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug tag (verify static)
        run: |
          echo "=== DEBUG: verifying tag is lowercase ==="
          TAG="ghcr.io/nexusbayarea/lostbobo-simhpc-base:stable"
          echo "Tag to use: $TAG"
          if echo "$TAG" | grep -qE '^[A-Z]'; then
            echo "ERROR: uppercase in tag!"
            exit 1
          fi
          echo "Tag verified OK"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (static lowercase)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/images/Dockerfile.base
          push: true
          tags: ghcr.io/nexusbayarea/lostbobo-simhpc-base:stable

      - name: Run CI Kernel
        run: |
          docker run --rm \
            -v $PWD:/app \
            -w /app \
            -e SB_URL=http://test \
            -e SB_DATA_URL=http://test \
            -e SB_JWT_SECRET=test \
            -e SB_PUB_KEY=test \
            -e SB_SECRET_KEY=test \
            -e SB_TOKEN=test \
            ghcr.io/nexusbayarea/lostbobo-simhpc-base:stable \
            python ci/kernel.py