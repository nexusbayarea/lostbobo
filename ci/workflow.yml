name: architecture-ci

entry: validate

steps:

  validate:
    type: parallel
    runs:
      - dependency_scan
      - import_guard
      - dag_compile
      - runtime_contract
      - worker_isolation

  dependency_scan:
    type: command
    run: python tools/ci_gates/dependency_scan.py

  import_guard:
    type: command
    run: python tools/ci_gates/import_guard.py

  dag_compile:
    type: command
    run: python tools/ci_gates/dag_compiler.py

  runtime_contract:
    type: command
    run: python -m app.api.kernel --mode=ci --dry-run

  worker_isolation:
    type: command
    run: python tools/ci_gates/worker_isolation.py

  test:
    type: command
    run: python -m pytest tests/ --tb=short -q

edges:
  validate -> test
