global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'simhpc-kernel'
    static_configs:
      - targets: ['kernel:8080']
    metrics_path: '/metrics'

  - job_name: 'simhpc-rag'
    static_configs:
      - targets: ['rag-service:50051']
    metrics_path: '/metrics'

  - job_name: 'simhpc-gpu-worker'
    static_configs:
      - targets: ['gpu-worker:50053']
    metrics_path: '/metrics'

  - job_name: 'simhpc-redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: '/metrics'

  - job_name: 'simhpc-telemetry'
    static_configs:
      - targets: ['localhost:9090']
